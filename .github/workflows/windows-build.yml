# Build Windows binary + Inno Setup installer on every push and tag.
# Artifacts: Dante-CLI-Setup-<version>-x64.exe and the raw deploy/ folder.
name: windows-build

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  workflow_dispatch:

# Needed so GITHUB_TOKEN can create/attach to releases (default token is RO).
permissions:
  contents: write

env:
  QT_VERSION: 6.7.2
  BUILD_TYPE: Release
  APP_VERSION: 0.7.0

jobs:
  build:
    name: build-windows-x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtshadertools
          cache: true
          setup-python: false

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (CMake + Ninja)
        shell: cmd
        run: |
          cmake -S . -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ^
            -DCMAKE_PREFIX_PATH="%QT_ROOT_DIR%"

      - name: Build
        shell: cmd
        run: cmake --build build --parallel

      - name: Collect deploy folder
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path build -Recurse -Filter "Dante CLI.exe" | Select-Object -First 1
          if (-not $exe) { throw "Dante CLI.exe not produced" }
          $deploy = Join-Path $env:GITHUB_WORKSPACE 'deploy'
          New-Item -ItemType Directory -Force -Path $deploy | Out-Null
          Copy-Item "$($exe.DirectoryName)\*" $deploy -Recurse -Force
          Write-Host "Deploy contents:"
          Get-ChildItem $deploy | Format-Table Name, Length

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Compile installer
        shell: cmd
        run: |
          if not exist dist mkdir dist
          iscc /Qp /DAppVersion=${{ env.APP_VERSION }} /DSourceDir=..\deploy /DOutputDir=..\dist installer\dante-cli.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: Dante-CLI-Setup-windows-x64
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 5

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: Dante-CLI-portable-windows-x64
          path: deploy/**
          retention-days: 5

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          draft: false
          prerelease: false
